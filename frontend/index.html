<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        :root { --accent: #2f6f4f; --bg: #f4f6f5; --card: #ffffff; }
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: #1c2b24; }
        header { background: var(--accent); color: #fff; padding: 18px 24px; }
        header h1 { margin: 0; font-size: 20px; }
        main { max-width: 640px; margin: 24px auto; padding: 0 16px; }
        .card { background: var(--card); border-radius: 10px; padding: 18px; margin-bottom: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        form { display: flex; gap: 8px; flex-wrap: wrap; }
        input { flex: 1; min-width: 120px; padding: 10px; border: 1px solid #cbd5cf; border-radius: 6px; }
        button { background: var(--accent); color: #fff; border: 0; padding: 10px 16px; border-radius: 6px; cursor: pointer; }
        button.del { background: #b23b3b; padding: 6px 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e3e8e5; }
        .total { font-weight: bold; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>
    <header><h1>💸 Expense Tracker</h1></header>
    <main>
        <div class="card">
            <form id="expense-form">
                <input type="text" id="item" placeholder="Item (e.g. Coffee)" required>
                <input type="number" id="amount" placeholder="Amount" step="0.01" min="0" required>
                <button type="submit">Add</button>
            </form>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Item</th><th>Amount</th><th></th></tr></thead>
                <tbody id="expense-list"></tbody>
            </table>
            <div class="total" id="total">Total: 0.00</div>
        </div>
    </main>

    <script>
        // API base is injected at runtime via window.API_BASE (see entrypoint), defaults to /api
        const API = (window.API_BASE || "") + "/api/expenses";

        async function load() {
            const res = await fetch(API);
            const data = await res.json();
            const list = document.getElementById("expense-list");
            list.innerHTML = "";
            let total = 0;
            data.forEach(e => {
                total += parseFloat(e.amount);
                const row = document.createElement("tr");
                row.innerHTML = `<td>${e.item}</td><td>${parseFloat(e.amount).toFixed(2)}</td>
                    <td><button class="del" onclick="del(${e.id})">✕</button></td>`;
                list.appendChild(row);
            });
            document.getElementById("total").textContent = "Total: " + total.toFixed(2);
        }

        async function del(id) {
            await fetch(API + "/" + id, { method: "DELETE" });
            load();
        }

        document.getElementById("expense-form").addEventListener("submit", async (ev) => {
            ev.preventDefault();
            const item = document.getElementById("item").value;
            const amount = document.getElementById("amount").value;
            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ item, amount: parseFloat(amount) })
            });
            ev.target.reset();
            load();
        });

        load();
    </script>
</body>
</html>
