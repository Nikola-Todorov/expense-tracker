spring.application.name=expense-tracker

# Database configuration (all values come from environment variables)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:expensedb}
spring.datasource.username=${DB_USER:expenseuser}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator health endpoint for k8s probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

server.port=${APP_PORT:8080}
