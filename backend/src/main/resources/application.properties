spring.application.name=expense-tracker

# MongoDB configuration (all values come from environment variables).
# Root credentials live in the "admin" database, hence authSource=admin.
spring.data.mongodb.uri=mongodb://${DB_USER:ledger_admin}:${DB_PASSWORD:changeme}@${DB_HOST:localhost}:${DB_PORT:27017}/${DB_NAME:kiiis_ledger}?authSource=admin

# Actuator health endpoint for k8s probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

server.port=${APP_PORT:8080}
