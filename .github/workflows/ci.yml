name: CI — build, test, publish

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel any in-progress run on the same branch when a new push lands —
# keeps DockerHub free of half-built images from superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/kiiis-ledger-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/kiiis-ledger-ui

jobs:
  test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run mvn test
        working-directory: ./backend
        run: mvn -B -ntp test

  publish:
    name: Build & push images to DockerHub
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:main
            ${{ env.BACKEND_IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:main
            ${{ env.FRONTEND_IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Summary
        run: |
          {
            echo "### Images pushed";
            echo "";
            echo "| Service | Tags |";
            echo "|---|---|";
            echo "| backend  | \`${{ env.BACKEND_IMAGE }}:latest\`, \`:main\`, \`:sha-${{ steps.vars.outputs.short_sha }}\` |";
            echo "| frontend | \`${{ env.FRONTEND_IMAGE }}:latest\`, \`:main\`, \`:sha-${{ steps.vars.outputs.short_sha }}\` |";
          } >> "$GITHUB_STEP_SUMMARY"
