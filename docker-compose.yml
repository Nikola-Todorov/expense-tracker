services:
  database:
    image: mongo:7
    container_name: kiiis-ledger-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ledger_admin
      MONGO_INITDB_ROOT_PASSWORD: K11s_l3dger_dev_2026
      MONGO_INITDB_DATABASE: kiiis_ledger
    volumes:
      - kiiis-ledger-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kiiis-app-net

  backend:
    build: ./backend
    image: kiiis-ledger-backend:local
    container_name: kiiis-ledger-backend
    environment:
      DB_HOST: database
      DB_PORT: "27017"
      DB_NAME: kiiis_ledger
      DB_USER: ledger_admin
      DB_PASSWORD: K11s_l3dger_dev_2026
      APP_PORT: "8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - kiiis-app-net

  frontend:
    build: ./frontend
    image: kiiis-ledger-ui:local
    container_name: kiiis-ledger-ui
    ports:
      - "8095:80"
    depends_on:
      - backend
    networks:
      - kiiis-app-net

volumes:
  kiiis-ledger-mongo-data:

networks:
  kiiis-app-net:
    driver: bridge
