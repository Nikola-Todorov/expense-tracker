# Ingress fronts both services on a single host:
#   /api/*  -> backend Service (Spring Boot REST API)
#   /*      -> ledger-ui Service (static UI)
# This bypasses the in-image nginx /api proxy on the UI pod — cleaner than
# letting the frontend forward API traffic in-cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ledger-ingress
  namespace: kiiis-ledger
  labels:
    app.kubernetes.io/part-of: kiiis-ledger
    app.kubernetes.io/component: edge
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: ledger.kiiis.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ledger-ui
                port:
                  number: 80
