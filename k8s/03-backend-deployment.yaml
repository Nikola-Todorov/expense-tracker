# Non-sensitive backend configuration.
# DB_HOST points at the headless Service "ledger-db" in this namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-api-config
  namespace: kiiis-ledger
  labels:
    app.kubernetes.io/part-of: kiiis-ledger
    app.kubernetes.io/component: api
data:
  DB_HOST: ledger-db
  DB_PORT: "27017"
  DB_NAME: kiiis_ledger
  DB_USER: ledger_admin
  APP_PORT: "8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: ledger-api-secret
  namespace: kiiis-ledger
  labels:
    app.kubernetes.io/part-of: kiiis-ledger
    app.kubernetes.io/component: api
type: Opaque
stringData:
  DB_PASSWORD: K11s_l3dger_dev_2026
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-api
  namespace: kiiis-ledger
  labels:
    app.kubernetes.io/part-of: kiiis-ledger
    app.kubernetes.io/component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ledger-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ledger-api
        app.kubernetes.io/part-of: kiiis-ledger
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: docker.io/nixiblatec/kiiis-ledger-backend:latest
          # IfNotPresent so a locally-loaded image (e.g. `minikube image load`)
          # is preferred when one is already cached on the node. Useful when
          # iterating without re-pushing to the registry.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: ledger-api-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ledger-api-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
