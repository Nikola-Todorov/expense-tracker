# Non-sensitive DB configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: expense-tracker
data:
  POSTGRES_DB: expensedb
  POSTGRES_USER: expenseuser
  PGDATA: /var/lib/postgresql/data/pgdata
---
# Sensitive DB credentials (demo value; in production use a sealed/managed secret)
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: expense-tracker
type: Opaque
stringData:
  POSTGRES_PASSWORD: s3cr3t-pg-pass
