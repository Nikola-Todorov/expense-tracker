# Non-sensitive MongoDB configuration consumed by the official mongo image
# on first init (MONGO_INITDB_* env vars).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-db-config
  namespace: kiiis-ledger
  labels:
    app.kubernetes.io/part-of: kiiis-ledger
    app.kubernetes.io/component: database
data:
  MONGO_INITDB_DATABASE: kiiis_ledger
  MONGO_INITDB_ROOT_USERNAME: ledger_admin
---
apiVersion: v1
kind: Secret
metadata:
  name: ledger-db-secret
  namespace: kiiis-ledger
  labels:
    app.kubernetes.io/part-of: kiiis-ledger
    app.kubernetes.io/component: database
type: Opaque
stringData:
  MONGO_INITDB_ROOT_PASSWORD: K11s_l3dger_dev_2026
