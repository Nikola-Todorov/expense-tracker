# Non-sensitive Postgres configuration.
# PGDATA points to a subdir so the volume's lost+found dir doesn't break initdb.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-db-config
  namespace: kiiis-ledger
  labels:
    app.kubernetes.io/part-of: kiiis-ledger
    app.kubernetes.io/component: database
data:
  POSTGRES_DB: kiiis_ledger
  POSTGRES_USER: ledger_admin
  PGDATA: /var/lib/postgresql/data/pgdata
---
apiVersion: v1
kind: Secret
metadata:
  name: ledger-db-secret
  namespace: kiiis-ledger
  labels:
    app.kubernetes.io/part-of: kiiis-ledger
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_PASSWORD: K11s_l3dger_dev_2026
